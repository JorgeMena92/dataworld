site_name: Data World
site_description: Data Engineering — SQL, Power BI, Databricks & beyond
site_author: Jorge Mena
site_url: https://jorgemena92.github.io/dataworld/  # ← replace with your GitHub Pages URL
copyright: "© 2026 Jorge Mena"

# ─────────────────────────────────────────
#  THEME
# ─────────────────────────────────────────
theme:
  name: material
  logo: assets/logo.png
  icon:
    logo: null

  font:
    text: DM Sans                 # clean, modern, not generic
    code: JetBrains Mono          # beautiful for SQL / code blocks

  palette:
    # Light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  features:
    # Navigation
    - navigation.instant          # SPA-like page transitions (no reload feel)
    - navigation.instant.progress # progress bar on slow pages
    - navigation.tracking         # URL updates as user scrolls
    - navigation.tabs             # top-level sections as horizontal tabs
    - navigation.tabs.sticky      # tabs stay visible while scrolling
    - navigation.sections         # group sub-pages under section headers
    - navigation.expand           # auto-expand active section
    - navigation.top              # back-to-top button
    - navigation.indexes          # section index pages (index.md per folder)
    - navigation.path             # breadcrumb trail

    # Search
    - search.highlight            # highlight search terms in results
    - search.suggest              # autocomplete suggestions
    - search.share                # shareable search URL

    # Content
    - content.code.copy           # copy button on code blocks
    - content.code.annotate       # inline code annotations
    - content.tabs.link           # link content tabs across pages
    - content.tooltips            # rich tooltips on hover
    - toc.follow                  # TOC highlights active heading

