    <label class="custom-nav__toggle" title="Switch theme">
      <input type="checkbox" id="theme-toggle" />

      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
    </label>
    <!-- Search -->
    <div class="custom-nav__search">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" placeholder="Search…" />
    </div>
  </div>
</nav>

<script>
  const toggle = document.getElementById('theme-toggle');
  const html = document.querySelector('[data-md-color-scheme]');
  toggle.checked = html?.getAttribute('data-md-color-scheme') === 'slate';
  toggle.addEventListener('change', () => {
    const scheme = toggle.checked ? 'slate' : 'default';
    html?.setAttribute('data-md-color-scheme', scheme);
    localStorage.setItem('data-md-color-scheme', scheme);
  });
</script>
{% endblock %}
