# ─────────────────────────────────────────
#  PLUGINS
# ─────────────────────────────────────────
plugins:
  - search:
      lang: en
  - tags                          # add tags: [sql, window] in any page's frontmatter
  - minify:                       # smaller output for GitHub Pages
      minify_html: true
  # - social:                     # uncomment after installing cairo on your system
  #     cards_layout_options:     # pip install mkdocs-material[imaging]
  #       font_family: DM Sans    # https://squidfunk.github.io/mkdocs-material/plugins/social/

# ─────────────────────────────────────────
#  MARKDOWN EXTENSIONS
# ─────────────────────────────────────────
markdown_extensions:
  # Admonitions — styled callout blocks (tip, warning, note, etc.)
  - admonition
  - pymdownx.details             # collapsible admonitions
  - pymdownx.superfences:        # fenced code blocks + diagrams
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:          # syntax highlighting
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite        # `inline code` highlighting
  - pymdownx.tabbed:             # content tabs (e.g. SQL vs Python)
      alternate_style: true
  - pymdownx.tasklist:           # - [x] checkboxes
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list                    # add CSS classes to elements
  - md_in_html                   # markdown inside HTML blocks
  - tables
  - toc:
      permalink: true            # anchor links on headings
      title: On this page

