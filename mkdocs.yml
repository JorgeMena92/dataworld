site_name: Jorge Mena - Data Engineering Notes
site_description: SQL, Power BI, Databricks, and Data Engineering tutorials
site_author: Jorge Mena

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.highlight
    - search.share

nav:
  - Home: index.md
  - SQL: sql/index.md
  - Power BI: powerbi/index.md
  - Databricks: databricks/index.md
  - Projects: projects/index.md
  - Notes: notes/index.md