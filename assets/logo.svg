<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <!-- Dark background square with cut corner = the "fun" detail -->
    <clipPath id="clip-shape">
      <polygon points="0,0 130,0 160,30 160,160 0,160"/>
    </clipPath>

    <!-- Amber gradient for the accent bar -->
    <linearGradient id="amber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#d4880f"/>
    </linearGradient>
  </defs>

  <!-- Background: near-black with clipped corner -->
  <polygon
    points="0,0 130,0 160,30 160,160 0,160"
    fill="#111010"
  />

  <!-- Cut corner triangle accent — amber fill -->
  <polygon
    points="130,0 160,0 160,30"
    fill="url(#amber-grad)"
  />

  <!-- Subtle grid lines — data / engineering feel -->
  <line x1="0"   y1="53"  x2="160" y2="53"  stroke="#ffffff" stroke-width="0.4" opacity="0.07"/>
  <line x1="0"   y1="106" x2="160" y2="106" stroke="#ffffff" stroke-width="0.4" opacity="0.07"/>
  <line x1="53"  y1="0"   x2="53"  y2="160" stroke="#ffffff" stroke-width="0.4" opacity="0.07"/>
  <line x1="106" y1="0"   x2="106" y2="160" stroke="#ffffff" stroke-width="0.4" opacity="0.07"/>

  <!-- Amber underline bar — anchors the letterforms -->
  <rect x="28" y="118" width="104" height="4" rx="2" fill="url(#amber-grad)"/>

  <!-- J — clean geometric sans -->
  <text
    x="34"
    y="112"
    font-family="'DM Serif Display', 'Georgia', serif"
    font-size="78"
    font-weight="400"
    font-style="italic"
    fill="#fafaf8"
    letter-spacing="-4"
  >J</text>

  <!-- M -->
  <text
    x="76"
    y="112"
    font-family="'DM Sans', 'Helvetica Neue', sans-serif"
    font-size="72"
    font-weight="700"
    fill="#fafaf8"
    letter-spacing="-2"
  >M</text>

</svg>
